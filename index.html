<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Gastos HyJ">
<meta name="theme-color" content="#0d0d0d">
<title>Gastos HyJ</title>

<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Instrument+Sans:wght@300;400;500&display=swap');

  :root {
    --bg: #0d0d0d;
    --surface: #161616;
    --surface2: #1e1e1e;
    --border: #282828;
    --accent: #d4f244;
    --accent2: #93a82d;
    --text: #f5f5f5;
    --text-dim: #666;
    --text-mid: #999;
    --error: #ff4d4d;
    --success: #d4f244;
    --radius: 16px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  html, body {
    height: 100%;
    overscroll-behavior: none;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Instrument Sans', sans-serif;
    min-height: 100vh;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
  }

  /* SCREENS */
  .screen { display: none; flex-direction: column; min-height: 100vh; min-height: 100dvh; }
  .screen.active { display: flex; }

  /* ---- SETUP SCREEN ---- */
  #setupScreen {
    padding: 48px 24px 32px;
    justify-content: center;
  }

  .setup-logo {
    text-align: center;
    margin-bottom: 40px;
  }

  .setup-logo .icon {
    width: 64px;
    height: 64px;
    background: var(--accent);
    border-radius: 18px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 16px;
    font-size: 28px;
  }

  .setup-logo h1 {
    font-family: 'Syne', sans-serif;
    font-size: 28px;
    font-weight: 800;
    letter-spacing: -1px;
  }

  .setup-logo p {
    font-size: 14px;
    color: var(--text-dim);
    margin-top: 4px;
  }

  .setup-form { display: flex; flex-direction: column; gap: 16px; }

  .field { display: flex; flex-direction: column; gap: 6px; }

  .field label {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    color: var(--text-dim);
  }

  .field input {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    color: var(--text);
    font-family: 'Instrument Sans', sans-serif;
    font-size: 15px;
    padding: 14px 16px;
    outline: none;
    transition: border-color 0.2s;
    width: 100%;
    -webkit-appearance: none;
  }

  .field input:focus { border-color: var(--accent); }
  .field input[type="password"] { letter-spacing: 2px; font-size: 18px; }

  .hint {
    font-size: 12px;
    color: var(--text-dim);
    line-height: 1.5;
    background: var(--surface);
    border-radius: 10px;
    padding: 12px 14px;
    border-left: 3px solid var(--border);
  }

  .hint a { color: var(--accent); text-decoration: none; }

  /* ---- MAIN SCREEN ---- */
  #mainScreen { background: var(--bg); }

  .topbar {
    padding: 56px 24px 20px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    position: relative;
  }

  .topbar-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .topbar h1 {
    font-family: 'Syne', sans-serif;
    font-size: 24px;
    font-weight: 800;
    letter-spacing: -0.5px;
  }

  .topbar h1 span { color: var(--accent); }

  .settings-btn {
    width: 38px;
    height: 38px;
    border-radius: 10px;
    background: var(--surface2);
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-size: 16px;
  }

  .content {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
    padding-bottom: 120px;
  }

  /* PERSON SELECTOR */
  .person-selector {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 24px;
  }

  .person-btn {
    background: var(--surface);
    border: 2px solid var(--border);
    border-radius: var(--radius);
    padding: 14px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    font-family: 'Syne', sans-serif;
    font-size: 16px;
    font-weight: 700;
    color: var(--text-mid);
  }

  .person-btn.active {
    border-color: var(--accent);
    background: rgba(212, 242, 68, 0.08);
    color: var(--accent);
  }

  .person-btn .avatar {
    font-size: 26px;
    margin-bottom: 6px;
  }

  /* FORM */
  .form-group { margin-bottom: 16px; }

  .form-group label {
    display: block;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 8px;
  }

  .form-group input,
  .form-group select {
    width: 100%;
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    color: var(--text);
    font-family: 'Instrument Sans', sans-serif;
    font-size: 16px;
    padding: 14px 16px;
    outline: none;
    transition: border-color 0.2s;
    -webkit-appearance: none;
    appearance: none;
  }

  .form-group input:focus,
  .form-group select:focus { border-color: var(--accent); }

  .form-group input[type="number"] { font-size: 22px; font-weight: 500; }

  .type-chips {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 8px;
  }

  .chip {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 20px;
    padding: 6px 14px;
    font-size: 13px;
    color: var(--text-mid);
    cursor: pointer;
    transition: all 0.15s;
    font-family: 'Instrument Sans', sans-serif;
  }

  .chip:active, .chip.selected {
    background: rgba(212, 242, 68, 0.1);
    border-color: var(--accent);
    color: var(--accent);
  }

  /* BOTTOM ACTION */
  .bottom-action {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    padding: 16px 24px;
    padding-bottom: calc(16px + env(safe-area-inset-bottom));
    background: linear-gradient(to top, var(--bg) 70%, transparent);
  }

  .btn-main {
    width: 100%;
    background: var(--accent);
    color: #0d0d0d;
    border: none;
    border-radius: var(--radius);
    font-family: 'Syne', sans-serif;
    font-size: 17px;
    font-weight: 700;
    padding: 18px;
    cursor: pointer;
    letter-spacing: -0.3px;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .btn-main:active { transform: scale(0.97); background: var(--accent2); }
  .btn-main:disabled { background: var(--surface2); color: var(--text-dim); transform: none; cursor: not-allowed; }

  .btn-secondary {
    width: 100%;
    background: transparent;
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    font-size: 16px;
    font-weight: 600;
    padding: 16px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-secondary:active { background: var(--surface2); }

  /* TOAST */
  .toast {
    position: fixed;
    bottom: 100px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 20px;
    font-size: 14px;
    white-space: nowrap;
    opacity: 0;
    transition: all 0.3s;
    z-index: 999;
    max-width: 320px;
    text-align: center;
  }

  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  .toast.success { border-color: var(--accent); color: var(--accent); }
  .toast.error { border-color: var(--error); color: var(--error); }

  /* HISTORY */
  .section-title {
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.5px;
    color: var(--text-dim);
    text-transform: uppercase;
    margin-bottom: 12px;
    margin-top: 28px;
  }

  .history-list { display: flex; flex-direction: column; gap: 8px; }

  .history-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    animation: fadeIn 0.3s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .history-left .h-name {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 14px;
    margin-bottom: 2px;
  }

  .history-left .h-meta {
    font-size: 12px;
    color: var(--text-dim);
  }

  .history-right .h-amount {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 18px;
    color: var(--accent);
  }

  .empty-state {
    text-align: center;
    padding: 24px;
    color: var(--text-dim);
    font-size: 13px;
  }

  /* DIVIDER */
  .divider {
    height: 1px;
    background: var(--border);
    margin: 20px 0;
  }

  /* LOADING SPINNER */
  .spinner {
    width: 18px;
    height: 18px;
    border: 2px solid rgba(0,0,0,0.2);
    border-top-color: #0d0d0d;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* SETTINGS PANEL */
  .settings-panel {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 100;
    align-items: flex-end;
  }

  .settings-panel.open { display: flex; }

  .settings-sheet {
    background: var(--surface);
    border-radius: 24px 24px 0 0;
    padding: 24px;
    padding-bottom: calc(24px + env(safe-area-inset-bottom));
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .settings-handle {
    width: 40px;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    margin: 0 auto 8px;
  }

  .settings-sheet h2 {
    font-family: 'Syne', sans-serif;
    font-size: 18px;
    font-weight: 700;
  }
</style>
</head>
<body>

<!-- SETUP SCREEN -->
<div class="screen active" id="setupScreen">
  <div class="setup-logo">
    <div class="icon">💸</div>
    <h1>Gastos HyJ</h1>
    <p>Conectá tu planilla de Google Sheets</p>
  </div>

  <div class="setup-form">
    <div class="field">
      <label>API Key de Google Sheets</label>
      <input type="password" id="s_apiKey" placeholder="AIza..." autocomplete="off" inputmode="text">
    </div>

    <div class="field">
      <label>ID de la planilla</label>
      <input type="text" id="s_sheetId" value="1uLhtYbglwHZ8YTn8DmQkZMjVeDPpf9H_r8DOXL66hzY" autocomplete="off">
    </div>

    <div class="field">
      <label>Nombre de la hoja</label>
      <input type="text" id="s_sheetName" value="Hoja1" autocomplete="off">
    </div>

    <div class="hint">
      ⚡ Tu API Key se guarda solo en este dispositivo y nunca se comparte con nadie.
    </div>

    <button class="btn-main" onclick="setupDone()">Empezar →</button>
  </div>
</div>

<!-- MAIN SCREEN -->
<div class="screen" id="mainScreen">

  <div class="topbar">
    <div class="topbar-row">
      <h1>Gastos <span>HyJ</span></h1>
      <div class="settings-btn" onclick="openSettings()">⚙️</div>
    </div>
  </div>

  <div class="content">
    <!-- PERSON -->
    <div class="person-selector">
      <div class="person-btn active" id="btn_hernan" onclick="selectPerson('Hernan')">
        <div class="avatar">👨</div>
        Hernan
      </div>
      <div class="person-btn" id="btn_jessi" onclick="selectPerson('Jessi')">
        <div class="avatar">👩</div>
        Jessi
      </div>
    </div>

    <!-- FECHA -->
    <div class="form-group">
      <label>Fecha</label>
      <input type="date" id="fecha">
    </div>

    <!-- TIPO -->
    <div class="form-group">
      <label>Tipo de gasto</label>
      <input type="text" id="tipo" placeholder="Ej: Super, Nafta, Luz..." autocomplete="off">
      <div class="type-chips">
        <div class="chip" onclick="setTipo('Super')">🛒 Super</div>
        <div class="chip" onclick="setTipo('Nafta')">⛽ Nafta</div>
        <div class="chip" onclick="setTipo('Luz')">💡 Luz</div>
        <div class="chip" onclick="setTipo('Alquiler')">🏠 Alquiler</div>
        <div class="chip" onclick="setTipo('Apps')">📱 Apps</div>
        <div class="chip" onclick="setTipo('Salud')">🏥 Salud</div>
      </div>
    </div>

    <!-- MONTO -->
    <div class="form-group">
      <label>Monto ($)</label>
      <input type="number" id="monto" placeholder="0" inputmode="decimal" step="0.01">
    </div>

    <!-- HISTORY -->
    <div class="divider"></div>
    <div class="section-title">Esta sesión</div>
    <div class="history-list" id="historyList">
      <div class="empty-state">Aún no cargaste gastos</div>
    </div>
  </div>

  <div class="bottom-action">
    <button class="btn-main" id="btnCargar" onclick="cargarGasto()">
      Cargar gasto
    </button>
  </div>
</div>

<!-- SETTINGS PANEL -->
<div class="settings-panel" id="settingsPanel" onclick="closeSettingsOutside(event)">
  <div class="settings-sheet">
    <div class="settings-handle"></div>
    <h2>Configuración</h2>

    <div class="field">
      <label>API Key</label>
      <input type="password" id="cfg_apiKey" autocomplete="off">
    </div>
    <div class="field">
      <label>ID de planilla</label>
      <input type="text" id="cfg_sheetId" autocomplete="off">
    </div>
    <div class="field">
      <label>Nombre de hoja</label>
      <input type="text" id="cfg_sheetName" autocomplete="off">
    </div>

    <button class="btn-main" onclick="saveSettings()">Guardar</button>
    <button class="btn-secondary" onclick="closeSettings()">Cancelar</button>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
  // ---- STATE ----
  let config = { apiKey: '', sheetId: '', sheetName: 'Hoja1' };
  let selectedPerson = 'Hernan';
  let sessionHistory = [];

  // ---- INIT ----
  const saved = localStorage.getItem('gastosHyJ_config');
  if (saved) {
    try {
      config = JSON.parse(saved);
      if (config.apiKey) showScreen('mainScreen');
    } catch(e) {}
  }

  // Set today
  const now = new Date();
  const pad = n => String(n).padStart(2,'0');
  const todayVal = `${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())}`;
  document.getElementById('fecha').value = todayVal;

  // ---- SCREENS ----
  function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }

  // ---- SETUP ----
  function setupDone() {
    const key = document.getElementById('s_apiKey').value.trim();
    const sid = document.getElementById('s_sheetId').value.trim();
    const sname = document.getElementById('s_sheetName').value.trim() || 'Hoja1';

    if (!key) { showToast('Ingresá tu API Key', 'error'); return; }
    if (!sid) { showToast('Ingresá el ID de la planilla', 'error'); return; }

    config = { apiKey: key, sheetId: sid, sheetName: sname };
    localStorage.setItem('gastosHyJ_config', JSON.stringify(config));
    showScreen('mainScreen');
    showToast('¡Configuración guardada!', 'success');
  }

  // ---- PERSON ----
  function selectPerson(name) {
    selectedPerson = name;
    document.getElementById('btn_hernan').classList.toggle('active', name === 'Hernan');
    document.getElementById('btn_jessi').classList.toggle('active', name === 'Jessi');
  }

  // ---- CHIPS ----
  function setTipo(val) {
    document.getElementById('tipo').value = val;
    document.querySelectorAll('.chip').forEach(c => {
      c.classList.toggle('selected', c.textContent.includes(val));
    });
  }

  // ---- CARGAR GASTO ----
  async function cargarGasto() {
    const fechaRaw = document.getElementById('fecha').value;
    const tipo = document.getElementById('tipo').value.trim();
    const monto = document.getElementById('monto').value;

    if (!fechaRaw || !tipo || !monto) {
      showToast('Completá todos los campos', 'error');
      return;
    }

    const [y, m, d] = fechaRaw.split('-');
    const fecha = `${parseInt(d)}/${parseInt(m)}/${y}`;

    const btn = document.getElementById('btnCargar');
    btn.disabled = true;
    btn.innerHTML = '<div class="spinner"></div>';

    const url = `https://sheets.googleapis.com/v4/spreadsheets/${config.sheetId}/values/${encodeURIComponent(config.sheetName)}:append?valueInputOption=USER_ENTERED&insertDataOption=INSERT_ROWS&key=${config.apiKey}`;

    try {
      const res = await fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ values: [[selectedPerson, fecha, tipo, parseFloat(monto), '', '']] })
      });

      const data = await res.json();

      if (!res.ok) {
        showToast(data?.error?.message || 'Error al cargar', 'error');
      } else {
        showToast(`✓ ${tipo} $${monto} cargado`, 'success');
        sessionHistory.unshift({ name: selectedPerson, fecha, tipo, monto });
        renderHistory();
        document.getElementById('tipo').value = '';
        document.getElementById('monto').value = '';
        document.querySelectorAll('.chip').forEach(c => c.classList.remove('selected'));
      }
    } catch(e) {
      showToast('Sin conexión: ' + e.message, 'error');
    }

    btn.disabled = false;
    btn.innerHTML = 'Cargar gasto';
  }

  // ---- HISTORY ----
  function renderHistory() {
    const el = document.getElementById('historyList');
    if (!sessionHistory.length) {
      el.innerHTML = '<div class="empty-state">Aún no cargaste gastos</div>';
      return;
    }
    el.innerHTML = sessionHistory.map(g => `
      <div class="history-card">
        <div class="history-left">
          <div class="h-name">${g.name} · ${g.tipo}</div>
          <div class="h-meta">${g.fecha}</div>
        </div>
        <div class="history-right">
          <div class="h-amount">$${parseFloat(g.monto).toLocaleString('es-AR')}</div>
        </div>
      </div>
    `).join('');
  }

  // ---- SETTINGS ----
  function openSettings() {
    document.getElementById('cfg_apiKey').value = config.apiKey;
    document.getElementById('cfg_sheetId').value = config.sheetId;
    document.getElementById('cfg_sheetName').value = config.sheetName;
    document.getElementById('settingsPanel').classList.add('open');
  }

  function closeSettings() {
    document.getElementById('settingsPanel').classList.remove('open');
  }

  function closeSettingsOutside(e) {
    if (e.target === document.getElementById('settingsPanel')) closeSettings();
  }

  function saveSettings() {
    const key = document.getElementById('cfg_apiKey').value.trim();
    const sid = document.getElementById('cfg_sheetId').value.trim();
    const sname = document.getElementById('cfg_sheetName').value.trim() || 'Hoja1';
    if (!key || !sid) { showToast('Completá los campos', 'error'); return; }
    config = { apiKey: key, sheetId: sid, sheetName: sname };
    localStorage.setItem('gastosHyJ_config', JSON.stringify(config));
    closeSettings();
    showToast('Configuración actualizada', 'success');
  }

  // ---- TOAST ----
  let toastTimer;
  function showToast(msg, type = '') {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.className = 'toast show ' + type;
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.classList.remove('show'), 3000);
  }
</script>
</body>
</html>
